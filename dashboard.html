<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Taxi 3042 — Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a1a; font-family: Arial, sans-serif; color: #fff; }
        .header {
            background: #2a2a2a;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #FAD201;
        }
        .header h1 { color: #FAD201; font-size: 22px; }
        .nav a {
            color: #fff;
            text-decoration: none;
            margin-left: 20px;
            font-size: 14px;
        }
        .nav a:hover { color: #FAD201; }
        .content { padding: 30px; }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #2a2a2a;
            padding: 24px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-card .number {
            font-size: 42px;
            font-weight: bold;
            color: #FAD201;
        }
        .stat-card .label {
            color: #888;
            margin-top: 8px;
            font-size: 14px;
        }
        .logout {
            color: #ff4444;
            text-decoration: none;
            margin-left: 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚕 TAXI 3042</h1>
        <div class="nav">
            <a href="/drivers">👥 Водители</a>
            <a href="/requests">📝 Заявки</a>
            <a href="/stats">📊 Статистика</a>
            <a href="/broadcast">📢 Рассылка</a>
            <a href="/logout" class="logout">Выйти</a>
        </div>
    </div>
    <div class="content">
        <h2 style="margin-bottom:24px;">Главная</h2>
        <div class="stats">
            <div class="stat-card">
                <div class="number">{{ stats.total }}</div>
                <div class="label">👥 Всего водителей</div>
            </div>
            <div class="stat-card">
                <div class="number" style="color:#4CAF50;">{{ stats.approved }}</div>
                <div class="label">✅ Одобрено</div>
            </div>
            <div class="stat-card">
                <div class="number" style="color:#ff9800;">{{ stats.pending }}</div>
                <div class="label">⏳ Ожидают</div>
            </div>
            <div class="stat-card">
                <div class="number" style="color:#f44336;">{{ stats.rejected }}</div>
                <div class="label">❌ Отклонено</div>
            </div>
            <div class="stat-card">
                <div class="number" style="color:#f44336;">{{ stats.blocked }}</div>
                <div class="label">🚫 Заблокировано</div>
            </div>
            <div class="stat-card">
                <div class="number" style="color:#2196F3;">{{ stats.today }}</div>
                <div class="label">📅 Сегодня</div>
            </div>
        </div>
    </div>
</body>
</html>
