<!DOCTYPE html>
<html>
<head>
    <title>Рассылка - Taxi Admin</title>
    <meta charset="utf-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">
    <nav class="navbar navbar-dark bg-secondary">
        <div class="container">
            <a href="/" class="navbar-brand">🚖 Taxi Admin</a>
            <div>
                <a href="/drivers" class="btn btn-outline-light btn-sm me-2">👥 Водители</a>
                <a href="/requests" class="btn btn-outline-warning btn-sm me-2">📝 Заявки</a>
                <a href="/stats" class="btn btn-outline-info btn-sm me-2">📊 Статистика</a>
                <a href="/broadcast" class="btn btn-outline-success btn-sm me-2">📢 Рассылка</a>
                <a href="/logout" class="btn btn-outline-danger btn-sm">Выход</a>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        <h2>📢 Рассылка</h2>
        {% if success %}
        <div class="alert alert-success">
            ✅ Отправлено: {{ sent }} | ❌ Ошибок: {{ failed }}
        </div>
        {% endif %}
        <div class="card bg-secondary p-4">
            <form method="POST">
                <div class="mb-3">
                    <label>Сообщение для всех водителей:</label>
                    <textarea name="message" 
                              class="form-control bg-dark text-white"
                              rows="5" 
                              placeholder="Введите сообщение..." 
                              required></textarea>
                </div>
                <button type="submit" class="btn btn-success">
                    📢 Отправить всем
                </button>
            </form>
        </div>
    </div>
</body>
</html>
