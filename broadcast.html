<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Рассылка</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a1a; font-family: Arial, sans-serif; color: #fff; }
        .header {
            background: #2a2a2a;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #FAD201;
        }
        .header h1 { color: #FAD201; }
        .nav a { color: #fff; text-decoration: none; margin-left: 20px; }
        .content { padding: 30px; max-width: 600px; }
        textarea {
            width: 100%;
            height: 200px;
            padding: 16px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            resize: vertical;
            margin-bottom: 16px;
        }
        button {
            padding: 14px 32px;
            background: #FAD201;
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }
        .success {
            background: #1b5e20;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: #4CAF50;
        }
        .logout { color: #ff4444; text-decoration: none; margin-left: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚕 TAXI 3042</h1>
        <div class="nav">
            <a href="/">🏠 Главная</a>
            <a href="/drivers">👥 Водители</a>
            <a href="/requests">📝 Заявки</a>
            <a href="/logout" class="logout">Выйти</a>
        </div>
    </div>
    <div class="content">
        <h2 style="margin-bottom:24px;">📢 Рассылка водителям</h2>
        {% if success %}
        <div class="success">
            ✅ Отправлено: {{ sent }} водителям
        </div>
        {% endif %}
        <form method="POST">
            <textarea name="message" placeholder="Введите сообщение..."></textarea>
            <button type="submit">📢 Отправить всем</button>
        </form>
    </div>
</body>
</html>
