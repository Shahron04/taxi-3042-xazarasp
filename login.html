<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi 3042 — Вход</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a1a;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: #2a2a2a;
            padding: 40px;
            border-radius: 12px;
            width: 360px;
            text-align: center;
        }
        h1 { color: #FAD201; font-size: 28px; margin-bottom: 8px; }
        p { color: #888; margin-bottom: 30px; }
        input {
            width: 100%; padding: 14px; margin-bottom: 16px;
            background: #333; border: 1px solid #444; border-radius: 8px;
            color: #fff; font-size: 16px;
        }
        input:focus { outline: none; border-color: #FAD201; }
        button {
            width: 100%; padding: 14px; background: #FAD201; color: #000;
            border: none; border-radius: 8px; font-size: 16px;
            font-weight: bold; cursor: pointer;
        }
        button:hover { background: #e6c200; }
        .error {
            background: #ff4444; color: #fff; padding: 10px;
            border-radius: 8px; margin-bottom: 16px; font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚕 TAXI 3042</h1>
        <p>Панель администратора</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <input type="text" name="username" placeholder="Логин" required/>
            <input type="password" name="password" placeholder="Пароль" required/>
            <button type="submit">ВОЙТИ</button>
        </form>
    </div>
</body>
</html>
